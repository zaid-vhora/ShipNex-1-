<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Management — LogiTrack Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'sta_admin/style.css' %}" />
  <style>
    .wh-card {
      background:#fff; border-radius:14px; border:1.5px solid #e2e8f0;
      padding:22px; transition:all 0.2s; position:relative; overflow:hidden;
    }
    .wh-card:hover { border-color:#3b82f6; box-shadow:0 8px 28px rgba(59,130,246,0.12); transform:translateY(-2px); }
    .wh-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
    .wh-card.c1::before { background:linear-gradient(90deg,#3b82f6,#06b6d4); }
    .wh-card.c2::before { background:linear-gradient(90deg,#10b981,#34d399); }
    .wh-card.c3::before { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
    .wh-card.c4::before { background:linear-gradient(90deg,#8b5cf6,#a78bfa); }
    .wh-id { font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase; }
    .wh-name { font-size:17px;font-weight:800;color:#1e293b;margin:6px 0 2px; }
    .wh-loc { font-size:13px;color:#64748b; }
    .cap-label { font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px; }
  </style>
</head>
<body>
<div class="admin-wrapper">
  <div class="main-content" id="mainContent">
    <div class="page-content">

      <div class="d-flex align-items-center justify-content-between mb-4 animate-up">
        <div>
          <h4 class="fw-800 text-dark mb-1">Warehouse Management</h4>
          <p class="text-muted mb-0" style="font-size:13px">Monitor all warehouse locations, capacity and operations</p>
        </div>
        <button class="btn-primary-custom" onclick="openModal('addWhModal')"><i class="fas fa-plus"></i> Add Warehouse</button>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-3 col-sm-6 animate-up-1"><div class="stat-card purple"><div class="stat-header"><span class="stat-label">Total Warehouses</span><div class="stat-icon"><i class="fas fa-warehouse"></i></div></div><div class="stat-value">12</div><div class="stat-change up"><i class="fas fa-arrow-trend-up"></i> 1 new this month</div></div></div>
        <div class="col-lg-3 col-sm-6 animate-up-2"><div class="stat-card green"><div class="stat-header"><span class="stat-label">Total Capacity</span><div class="stat-icon"><i class="fas fa-cubes"></i></div></div><div class="stat-value">48K m²</div><div class="stat-change up"><i class="fas fa-arrow-trend-up"></i> Combined</div></div></div>
        <div class="col-lg-3 col-sm-6 animate-up-3"><div class="stat-card orange"><div class="stat-header"><span class="stat-label">Occupancy</span><div class="stat-icon"><i class="fas fa-chart-bar"></i></div></div><div class="stat-value">74%</div><div class="stat-change down"><i class="fas fa-arrow-trend-down"></i> Average fill</div></div></div>
        <div class="col-lg-3 col-sm-6 animate-up-1"><div class="stat-card teal"><div class="stat-header"><span class="stat-label">Active Shipments</span><div class="stat-icon"><i class="fas fa-boxes-stacked"></i></div></div><div class="stat-value">1,248</div><div class="stat-change up"><i class="fas fa-arrow-trend-up"></i> In storage</div></div></div>
      </div>

      <!-- Filter Bar -->
      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:16px">
        <div class="filter-bar">
          <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search warehouse name or location..." /></div>
          <select class="filter-select"><option>All Locations</option><option>Mumbai</option><option>Delhi</option><option>Bangalore</option><option>Chennai</option></select>
          <button class="btn-secondary-custom"><i class="fas fa-download"></i> Export</button>
        </div>
      </div>

      <!-- Cards -->
      <div class="row g-3 animate-up-2" id="whCards"></div>

    </div>
  </div>
</div>

<!-- Add Warehouse Modal -->
<div class="modal-overlay" id="addWhModal">
  <div class="modal-box" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title"><i class="fas fa-warehouse" style="color:#8b5cf6;margin-right:8px"></i>Add New Warehouse</div>
      <button class="modal-close" onclick="closeModal('addWhModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Warehouse Name</label><input class="form-control-custom" placeholder="e.g. Mumbai Central Warehouse" /></div>
      <div class="form-group"><label class="form-label">Location / Address</label><textarea class="form-control-custom" rows="2" placeholder="Full address with pincode"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">City</label><input class="form-control-custom" placeholder="City" /></div>
        <div class="form-group"><label class="form-label">State</label><input class="form-control-custom" placeholder="State" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Capacity (m²)</label><input class="form-control-custom" type="number" placeholder="5000" /></div>
        <div class="form-group"><label class="form-label">Manager Name</label><input class="form-control-custom" placeholder="Warehouse manager" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Manager Phone</label><input class="form-control-custom" placeholder="+91 XXXXX XXXXX" /></div>
        <div class="form-group"><label class="form-label">Warehouse Type</label>
          <select class="form-control-custom"><option>Standard</option><option>Cold Storage</option><option>Bonded</option><option>Distribution</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary-custom" onclick="closeModal('addWhModal')">Cancel</button>
      <button class="btn-primary-custom"><i class="fas fa-check"></i> Add Warehouse</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'sta_admin/layout.js' %}"></script>
<script>
  initLayout('Warehouse Management', 'Warehouses');

  const warehouses = [
    { id:'WH-001', name:'Mumbai Central', location:'Bhiwandi, Maharashtra', manager:'Rakesh Sharma', capacity:8000, used:72, type:'Standard', shipments:324, col:'c1', icon:'#eff6ff', iconColor:'#3b82f6' },
    { id:'WH-002', name:'Delhi NCR Hub', location:'Gurgaon, Haryana', manager:'Seema Kapoor', capacity:12000, used:85, type:'Distribution', shipments:512, col:'c2', icon:'#ecfdf5', iconColor:'#10b981' },
    { id:'WH-003', name:'Bangalore South', location:'Hosur Road, Bangalore', manager:'Venkat Rao', capacity:6000, used:61, type:'Standard', shipments:198, col:'c3', icon:'#fffbeb', iconColor:'#f59e0b' },
    { id:'WH-004', name:'Chennai Port', location:'Ennore, Tamil Nadu', manager:'Murugan P.', capacity:10000, used:78, type:'Bonded', shipments:287, col:'c4', icon:'#f5f3ff', iconColor:'#8b5cf6' },
    { id:'WH-005', name:'Pune Logistics Park', location:'Chakan, Pune', manager:'Rohit Joshi', capacity:5500, used:55, type:'Standard', shipments:143, col:'c1', icon:'#eff6ff', iconColor:'#3b82f6' },
    { id:'WH-006', name:'Hyderabad CFS', location:'Shamshabad, Hyderabad', manager:'Padma Rao', capacity:7200, used:68, type:'Cold Storage', shipments:176, col:'c2', icon:'#ecfdf5', iconColor:'#10b981' },
  ];

  document.getElementById('whCards').innerHTML = warehouses.map(w => `
    <div class="col-xl-4 col-md-6">
      <div class="wh-card ${w.col}">
        <div class="d-flex align-items-center gap-3 mb-4">
          <div style="width:52px;height:52px;border-radius:14px;background:${w.icon};display:flex;align-items:center;justify-content:center;font-size:22px;color:${w.iconColor}">
            <i class="fas fa-warehouse"></i>
          </div>
          <div>
            <div class="wh-id">${w.id} &bull; ${w.type}</div>
            <div class="wh-name">${w.name}</div>
            <div class="wh-loc"><i class="fas fa-location-dot" style="color:#94a3b8;margin-right:4px;font-size:11px"></i>${w.location}</div>
          </div>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between mb-1">
            <div class="cap-label">Capacity Usage</div>
            <div style="font-size:13px;font-weight:700;color:#1e293b">${w.used}%</div>
          </div>
          <div class="progress-bar-custom">
            <div class="progress-fill" style="width:${w.used}%;background:${w.used>80?'linear-gradient(90deg,#ef4444,#f87171)':w.used>60?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#10b981,#34d399)'}"></div>
          </div>
          <div style="font-size:11.5px;color:#94a3b8;margin-top:4px">${Math.round(w.capacity*w.used/100).toLocaleString()} / ${w.capacity.toLocaleString()} m² used</div>
        </div>
        <div class="d-flex align-items-center gap-4 pt-3 border-top" style="font-size:13px">
          <div><div style="color:#94a3b8;font-size:11px;margin-bottom:2px">Manager</div><div style="font-weight:600;color:#374151">${w.manager}</div></div>
          <div><div style="color:#94a3b8;font-size:11px;margin-bottom:2px">Shipments</div><div style="font-weight:700;color:#1e293b">${w.shipments}</div></div>
          <div class="ms-auto d-flex gap-1">
            <button class="btn-action view" data-tooltip="View"><i class="fas fa-eye"></i></button>
            <button class="btn-action edit" data-tooltip="Edit"><i class="fas fa-pen"></i></button>
            <button class="btn-action delete" data-tooltip="Delete"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`).join('');

  function openModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }
  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('show'); }));
</script>
</body>
</html>
